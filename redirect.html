<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Redirecting...</title>
</head>
<body>
<script>
  // --- Analytics calls (fire & forget) ---
  function sendAnalytics(phone) {
    // Example: Google Analytics event
    // gtag('event', 'phone_redirect', { phone_number: phone });

    // Example: custom analytics endpoint
    // fetch('https://your-analytics.com/track', {
    //   method: 'POST',
    //   body: JSON.stringify({ event: 'call', phone, ts: Date.now() }),
    //   headers: { 'Content-Type': 'application/json' }
    // });

    console.log('Analytics fired for:', phone);
  }

  // --- Get phone from URL ---
  // Usage: redirect.html?phone=+15551234567
  const params = new URLSearchParams(window.location.search);
  const phone = params.get('phone');

  if (phone) {
    sendAnalytics(phone);
    window.location.href = 'tel:' + phone;
  } else {
    document.body.innerText = 'No phone number provided.';
  }
</script>
</body>
</html>
